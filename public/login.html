<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Task Tracker - Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body data-page="login">
    <div id="navbar-root"></div>

    <main class="page-wrap auth-wrap">
      <section class="card auth-card">
        <h2>Login to Continue</h2>
        <form id="login-form" novalidate>
          <div class="field">
            <label for="username">Username</label>
            <input id="username" type="text" placeholder="Enter username" />
            <small id="username-error" class="error-text"></small>
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="student@mail.com" />
            <small id="email-error" class="error-text"></small>
          </div>

          <div class="field">
            <label for="password">Password</label>
            <div class="password-row">
              <input id="password" type="password" placeholder="Enter password" />
              <button type="button" id="toggle-password" class="btn-icon" aria-label="Toggle password visibility">
                <i class="fa-regular fa-eye"></i>
              </button>
            </div>
            <small id="password-error" class="error-text"></small>
          </div>

          <button type="submit" class="btn btn-primary full">Login</button>
        </form>
        <div class="divider"><span>OR</span></div>
        <button id="google-login-btn" class="btn btn-google full" type="button">
          <i class="fa-brands fa-google"></i>
          Continue with Google
        </button>
      </section>
    </main>

    <script src="/js/app.js"></script>
  </body>
</html>
