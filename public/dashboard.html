<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Task Tracker - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body data-page="dashboard">
    <div id="navbar-root"></div>

    <main class="page-wrap dashboard-wrap">
      <section class="card welcome-card">
        <h2>Welcome, <span id="welcome-name">Student</span></h2>
      </section>

      <section class="stats-grid">
        <article class="card stat-card">
          <h4>Total Tasks</h4>
          <p id="total-count">0</p>
        </article>
        <article class="card stat-card success">
          <h4>Completed Tasks</h4>
          <p id="completed-count">0</p>
        </article>
        <article class="card stat-card warning">
          <h4>Pending Tasks</h4>
          <p id="pending-count">0</p>
        </article>
        <article class="card stat-card">
          <h4>Progress Percentage</h4>
          <p id="progress-count">0%</p>
        </article>
      </section>

      <section class="card progress-card">
        <h3>Task Completion Progress</h3>
        <div class="progress-bar-bg">
          <div id="progress-bar" class="progress-bar-fill">0%</div>
        </div>
      </section>

      <section class="card">
        <h3>Task Status Analytics</h3>
        <div class="chart-grid">
          <div class="chart-wrap">
            <h4>Completed Tasks</h4>
            <canvas id="completed-chart" aria-label="Completed tasks analytics chart"></canvas>
          </div>
          <div class="chart-wrap">
            <h4>Pending Tasks</h4>
            <canvas id="pending-chart" aria-label="Pending tasks analytics chart"></canvas>
          </div>
        </div>
      </section>

      <section class="grid-2">
        <section class="card">
          <h3>Add Task</h3>
          <form id="task-form" novalidate>
            <div class="field">
              <label for="task-title">Task Title</label>
              <input id="task-title" type="text" placeholder="e.g., Maths Assignment 2" />
              <small id="task-title-error" class="error-text"></small>
            </div>
            <div class="field">
              <label for="task-type">Task Type</label>
              <select id="task-type">
                <option value="">Select type</option>
                <option value="Assignment">Assignment</option>
                <option value="Exam">Exam</option>
                <option value="Project">Project</option>
                <option value="Custom">Custom</option>
              </select>
              <input id="custom-task-type" type="text" placeholder="Type custom task category" hidden />
              <small id="task-type-error" class="error-text"></small>
            </div>
            <div class="field">
              <label for="task-due-date">Due Date</label>
              <input id="task-due-date" type="date" />
              <small id="task-date-error" class="error-text"></small>
            </div>
            <button class="btn btn-primary full" type="submit">Add Task</button>
          </form>
        </section>

        <section class="card">
          <h3>Task Filters</h3>
          <div class="filter-row">
            <button class="btn btn-filter active" data-filter="all" type="button">All Tasks</button>
            <button class="btn btn-filter" data-filter="completed" type="button">Completed</button>
            <button class="btn btn-filter" data-filter="pending" type="button">Pending</button>
          </div>
          <div class="field search-field">
            <label for="search-task">Search Task</label>
            <input id="search-task" type="text" placeholder="Search by title..." />
          </div>
          <div id="filtered-task-list" class="task-list filter-list"></div>
          <p id="filtered-empty-state" class="empty-state">No tasks found for this filter.</p>
        </section>
      </section>

      <section class="card">
        <h3>Task List</h3>
        <div id="task-list" class="task-list"></div>
        <p id="empty-state" class="empty-state">No tasks found.</p>
      </section>

      <section id="edit-task-container" class="card" hidden>
        <h3>Edit Task</h3>
        <form id="edit-task-form" novalidate>
          <div class="field">
            <label for="edit-task-title">Task Title</label>
            <input id="edit-task-title" type="text" placeholder="Update task title" />
            <small id="edit-task-title-error" class="error-text"></small>
          </div>
          <div class="field">
            <label for="edit-task-type">Task Type</label>
            <select id="edit-task-type">
              <option value="">Select type</option>
              <option value="Assignment">Assignment</option>
              <option value="Exam">Exam</option>
              <option value="Project">Project</option>
              <option value="Custom">Custom</option>
            </select>
            <input id="edit-custom-task-type" type="text" placeholder="Type custom task category" hidden />
            <small id="edit-task-type-error" class="error-text"></small>
          </div>
          <div class="field">
            <label for="edit-task-due-date">Due Date</label>
            <input id="edit-task-due-date" type="date" />
            <small id="edit-task-date-error" class="error-text"></small>
          </div>
          <div class="edit-actions">
            <button class="btn btn-primary" type="submit">Update Task</button>
            <button id="cancel-edit-btn" class="btn" type="button">Cancel</button>
          </div>
        </form>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/js/app.js"></script>
  </body>
</html>
